<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Scoreboard Overlay</title>
  <style>
    :root {
      --bg: #07110f;
      --panel: rgba(8, 14, 20, 0.74);
      --text: #f7fafc;
      --muted: #cbd5e1;
      --line: rgba(255, 255, 255, 0.18);
      --win: #23c55e;
      --lose: #ef4444;
      --draw: #f8fafc;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      overflow-x: hidden;
      overflow-y: auto;
    }

    body.view-ticker {
      overflow: hidden;
    }

    body.with-bg {
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.44));
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 72px;
      margin-bottom: 18px;
      text-align: center;
    }

    .header img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 54px);
      font-weight: 800;
      line-height: 1.05;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
    }

    .status {
      display: grid;
      place-items: center;
      min-height: 240px;
      color: var(--muted);
      font-size: 28px;
      font-weight: 700;
      text-align: center;
    }

    table {
      width: min(1180px, 96vw);
      margin: 0 auto;
      border-collapse: collapse;
      overflow: hidden;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-size: clamp(16px, 1.8vw, 25px);
      font-weight: 750;
    }

    th {
      color: var(--muted);
      background: rgba(0, 0, 0, 0.28);
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .results {
      width: min(1180px, 96vw);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .date-group {
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .date-title {
      padding: 10px 16px;
      color: var(--muted);
      font-size: clamp(16px, 1.8vw, 24px);
      font-weight: 800;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .match-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-size: clamp(18px, 2.3vw, 34px);
      font-weight: 850;
    }

    .match-row:last-child { border-bottom: 0; }
    .side-a { justify-content: end; text-align: right; }
    .side-b { justify-content: start; text-align: left; }
    .team-side { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .team-side span { overflow-wrap: anywhere; }
    .score { text-align: center; color: var(--accent); white-space: nowrap; }
    .win { color: var(--win); }
    .lose { color: var(--lose); }
    .draw { color: var(--draw); }

    .ticker-shell {
      position: fixed;
      inset: auto 0 0;
      background: #00ff00;
      padding: 18px 0;
      overflow: hidden;
    }

    .ticker {
      display: inline-flex;
      align-items: center;
      gap: 36px;
      padding-left: 100%;
      color: #ffffff;
      font-size: clamp(28px, 5vw, 78px);
      font-weight: 900;
      white-space: nowrap;
      animation: scroll-left var(--ticker-duration, 42s) linear infinite;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .ticker .logo {
      width: 72px;
      height: 72px;
    }

    .ticker-score {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 6px;
      color: #111827;
      background: #ffffff;
      text-shadow: none;
    }

    @keyframes scroll-left {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header" id="header"></header>
    <section id="content" class="status">Loading...</section>
  </main>

  <script type="module" src="fcp_v2_assets/overlay.js"></script>
</body>
</html>
